# Solar Local Stack — Naming Dictionary
#
# HP's Requirements Dictionary in YAML form. This is the canonical source
# for entity identifiers and labels in the solar dogfood project.
# Artifacts (Mermaid, HTML, D2, SVGs) reference entities by their
# stable_id; rendering pulls labels from this file at render time.
#
# Rename = edit a label here, then regenerate dependent artifacts.
#
# Schema:
#   project, version, last_updated  — metadata
#   entities/<id>                   — system, terminators, processes (bubbles)
#   flows/<id>                      — data and control flows
#   edges/<id>                      — non-data edges (e.g., physical AC)
#
# Each entity carries: kind, label, level, description, optional fields.
# Each flow carries:   source, target, kind, medium, level, optional notes.

project: Solar Local Stack
version: "0.1"
last_updated: 2026-05-22

# ─────────────────────────────────────────────────────────────────────
# ENTITIES — the system and its terminators (level 0); internal bubbles
# at higher levels get added here as decomposition proceeds.
# ─────────────────────────────────────────────────────────────────────
entities:

  sys_root:
    kind: system
    label: "Solar Local Stack"
    level: 0
    description: |
      The orchestration software + local telemetry abstraction layer —
      the system under design. Replaces dependence on Hoymiles S-Miles
      Cloud. Implements dynamic excess-solar diversion, auto-discharge at
      night, and outage coordination with the Battery System.

  term_inverters:
    kind: terminator
    label: "Solar Inverters"
    level: 0
    description: |
      Microinverters (Hoymiles HMS-2000-4T-NA) performing per-channel
      MPPT and DC-AC conversion. Telemetry via Sub-1G RF to a DTU or
      OpenDTU/AhoyDTU gateway.

  term_meter:
    kind: terminator
    label: "Net Power Meter"
    level: 0
    description: |
      Utility-grade smart meter (Chint DTSU666) sensing net grid power
      direction over RS485 Modbus RTU. Primary sensor for the diversion
      loop — its sign tells the system whether the house is exporting
      or importing.

  term_battery_system:
    kind: terminator
    label: "Battery System"
    level: 0
    description: |
      Battery inverter-charger plus GX gateway (Victron MultiPlus + Cerbo
      GX). Two-way MQTT and Modbus TCP. Handles outage transfer (<20 ms)
      and ESS night-discharge natively via Venus OS.

  term_grid:
    kind: terminator
    label: "Utility Grid"
    level: 0
    description: |
      External utility (PG&E) under zero-export tariff. Observed via the
      Net Power Meter; not addressed by the system directly. Compliance:
      PG&E non-export rule + NEC 690.12 rapid shutdown.

  term_user:
    kind: terminator
    label: "Owner"
    level: 0
    description: |
      The homeowner. Configures the system, issues manual overrides,
      reviews dashboards, receives alerts.

  term_smiles_cloud:
    kind: terminator
    label: "S-Miles Cloud"
    level: 0
    optional: true
    description: |
      Hoymiles cloud monitoring platform. Optional terminator — off by
      default; only used if the owner wants belt-and-suspenders cloud
      forwarding. The vendor name is kept in the label because the
      meaning of this terminator is specifically "the vendor cloud the
      system is replacing."

  # ─── Level 1 — internal processes (bubbles inside sys_root) ───
  # Decomposition locked 2026-05-22 via 01-level1/proposal.md.
  # Working names below pending the level-1 naming review.

  proc_acquire_telemetry:
    kind: process
    label: "Acquire Telemetry"          # working name
    level: 1
    parent: sys_root
    description: |
      Multi-protocol ingest layer. Owns the device-facing protocols
      (Sub-1G RF or OpenDTU, Modbus RTU, MQTT/Modbus TCP); normalizes
      raw frames into uniform internal data. Single writer to
      store_system_state.

  proc_compute_balance:
    kind: process
    label: "Energy Manager"             # renamed from "Compute Energy Balance" via naming-review
    level: 1
    parent: sys_root
    needs_cspec: true
    description: |
      The brain. Implements the diversion control loop, the night-
      discharge logic, and the outage handling (per Decision 2: outage
      is a mode of this bubble's CSPEC, not a separate process). State-
      rich → requires a CSPEC at the next stage. Also the source of
      alert events (per Decision 5).

  proc_dispatch_commands:
    kind: process
    label: "Dispatch Commands"          # working name
    level: 1
    parent: sys_root
    description: |
      Output-side adapter. Translates internal commands (cmd_setpoint,
      cmd_inverter_limit) into vendor-specific protocols and writes
      them to actuators.

  proc_serve_ui:
    kind: process
    label: "Serve UI"                   # working name
    level: 1
    parent: sys_root
    description: |
      Presentation. Renders dashboards from store_system_state, surfaces
      alerts emitted by proc_compute_balance.

  proc_handle_user_input:
    kind: process
    label: "Handle Input"               # renamed from "Handle User Input" via naming-review
    level: 1
    parent: sys_root
    description: |
      Owner-facing input — configuration, manual overrides, enable/
      disable.

  proc_cloud_forward:
    kind: process
    label: "Cloud Forward"              # working name
    level: 1
    parent: sys_root
    optional: true
    description: |
      Optional telemetry forward to S-Miles Cloud when enabled.
      Separated from proc_acquire_telemetry to make optionality
      explicit (per Decision 1, 5-bubble default kept the optional 6th).

  # ─── Level 1 — data stores ───

  store_system_state:
    kind: data_store
    label: "System State"               # working name
    level: 1
    parent: sys_root
    description: |
      Normalized, unified system-state snapshot. Per Decision 4, modeled
      as an explicit data store rather than implicit flows. Single
      writer (proc_acquire_telemetry); multiple readers
      (proc_compute_balance, proc_serve_ui, proc_cloud_forward).

  # ─── Level 2 (CSPEC) — states inside proc_compute_balance / "Energy Manager" ───
  # Locked 2026-05-22 via 01-level1/cspecs/compute-balance/proposal.md.
  # Hierarchical state machine per Decisions 1–3. Working state names
  # below pending naming-review for state names.

  state_initializing:
    kind: state
    label: "Initializing"
    level: 2
    parent: proc_compute_balance
    is_initial: true       # entry point of the entire CSPEC
    description: |
      Startup state. Waiting for telemetry and Victron mode to settle
      before entering normal operation.

  state_grid_tie:
    kind: state_composite
    label: "GridTie"
    level: 2
    parent: proc_compute_balance
    description: |
      Top-level normal-operation mode. Grid is present. Contains the
      diversion loop and night-discharge sub-states.

  state_idle:
    kind: state
    label: "Idle"
    level: 2
    parent: proc_compute_balance
    parent_state: state_grid_tie
    is_initial: true       # initial sub-state of GridTie
    description: "Balanced — no surplus to divert, no import to discharge against."

  state_diverting:
    kind: state
    label: "Diverting"
    level: 2
    parent: proc_compute_balance
    parent_state: state_grid_tie
    description: "Solar surplus detected; commanding Battery System to absorb it via increasing max-charge current."

  state_holding:
    kind: state
    label: "Holding"
    level: 2
    parent: proc_compute_balance
    parent_state: state_grid_tie
    description: "Battery at or near saturation; diversion paused. Awaits headroom return or surplus drop."

  state_discharging:
    kind: state
    label: "Discharging"
    level: 2
    parent: proc_compute_balance
    parent_state: state_grid_tie
    description: "Night-discharge mode. Battery feeds loads via Victron ESS grid setpoint to keep net grid import near zero."

  state_island:
    kind: state_composite
    label: "Island"
    level: 2
    parent: proc_compute_balance
    description: |
      Outage mode. Victron has transferred to microgrid via its <20 ms
      transfer switch. Energy Manager observes and adjusts setpoints
      but does NOT drive the transfer itself.

  state_battery_discharge:
    kind: state
    label: "BatteryDischarge"
    level: 2
    parent: proc_compute_balance
    parent_state: state_island
    is_initial: true       # initial sub-state of Island
    description: "Running on battery only (no sun or sun insufficient). Victron drives the microgrid."

  state_ac_coupled_solar:
    kind: state
    label: "SolarAssist"                # renamed from "ACCoupledSolar" via naming-review
    level: 2
    parent: proc_compute_balance
    parent_state: state_island
    description: |
      Sun present; Victron's frequency-shift signaling keeps Solar
      Inverters alive on the microgrid. Battery absorbs surplus and
      releases as load demands.

  state_fault:
    kind: state_composite
    label: "Fault"
    level: 2
    parent: proc_compute_balance
    description: |
      Fault mode. Contains three sub-states by category. Recovery routes
      back to GridTie or Island depending on whether grid is present.

  state_telemetry_fault:
    kind: state
    label: "TelemetryFault"
    level: 2
    parent: proc_compute_balance
    parent_state: state_fault
    is_initial: true       # initial sub-state of Fault
    description: "Telemetry channels unavailable (Modbus down, Sub-1G RF lost, MQTT broker unreachable)."

  state_actuator_fault:
    kind: state
    label: "ActuatorFault"
    level: 2
    parent: proc_compute_balance
    parent_state: state_fault
    description: "Cannot command Battery System or Solar Inverters (MQTT publish failing, OpenDTU unreachable)."

  state_policy_fault:
    kind: state
    label: "PolicyFault"
    level: 2
    parent: proc_compute_balance
    parent_state: state_fault
    description: "Policy violation (out-of-range setpoint requested, conflicting overrides, configuration error)."

# ─────────────────────────────────────────────────────────────────────
# FLOWS — labeled data and control flows crossing entities.
# Level-0 flows are between sys_root and terminators.
# Higher-level flows (between internal bubbles) appear as decomposition
# proceeds.
# ─────────────────────────────────────────────────────────────────────
flows:

  flow_f1_inverter_telemetry:
    label: "F1: per-channel telemetry"
    source: term_inverters
    target: sys_root
    refined_target: proc_acquire_telemetry   # internal endpoint at level 1
    kind: data
    medium: "Sub-1G RF → DTU-Pro-S or OpenDTU"
    level: 0
    notes: "~30 s native polling; near-realtime via OpenDTU."

  flow_f2_power_limit:
    label: "F2: power-limit setpoints"
    source: sys_root
    target: term_inverters
    refined_source: proc_dispatch_commands   # internal endpoint at level 1
    kind: control
    medium: "OpenDTU only (not via official DTU)"
    level: 0
    notes: "Conditional on DTU architectural choice. See PLAN.md > Open Questions."

  flow_f3_net_grid_power:
    label: "F3: net grid power, V/I/PF"
    source: term_meter
    target: sys_root
    refined_target: proc_acquire_telemetry
    kind: data
    medium: "RS485 Modbus RTU"
    level: 0
    notes: "Primary sensing input for the diversion loop."

  flow_f4_battery_state:
    label: "F4: SoC, mode, AC-in"
    source: term_battery_system
    target: sys_root
    refined_target: proc_acquire_telemetry
    kind: data
    medium: "MQTT / Modbus TCP"
    level: 0
    notes: "Inbound side of a bidirectional channel."

  flow_f5_battery_command:
    label: "F5: max-charge, grid setpoint"
    source: sys_root
    target: term_battery_system
    refined_source: proc_dispatch_commands
    kind: control
    medium: "MQTT publish"
    level: 0
    notes: "Primary actuating output for the diversion loop."

  flow_f6_user_input:
    label: "F6: config, override"
    source: term_user
    target: sys_root
    refined_target: proc_handle_user_input
    kind: "data+control"
    medium: "UI"
    level: 0
    notes: "Mostly config; some commands are control-flow."

  flow_f7_user_view:
    label: "F7: dashboards, alerts"
    source: sys_root
    target: term_user
    refined_source: proc_serve_ui
    kind: data
    medium: "UI"
    level: 0

  flow_f8_cloud_forward:
    label: "F8: optional telemetry forward"
    source: sys_root
    target: term_smiles_cloud
    refined_source: proc_cloud_forward
    kind: data
    medium: "HTTPS"
    level: 0
    optional: true
    notes: "Off by default; only used if owner wants Hoymiles cloud retention."

  # ─── Level 1 — internal flows (between bubbles and the store) ───
  # Style per Decision 3: event-driven (publishes on state change),
  # not polling. Names are working names pending naming review.

  flow_telemetry_to_state:
    label: "normalized state"
    source: proc_acquire_telemetry
    target: store_system_state
    kind: data
    level: 1
    notes: "Sole writer path into store_system_state."

  flow_state_to_brain:
    label: "system_state"
    source: store_system_state
    target: proc_compute_balance
    kind: data
    level: 1
    notes: "Brain reads current state to compute commands."

  flow_state_to_ui:
    label: "system_state"
    source: store_system_state
    target: proc_serve_ui
    kind: data
    level: 1

  flow_state_to_cloud:
    label: "system_state"
    source: store_system_state
    target: proc_cloud_forward
    kind: data
    level: 1
    optional: true

  flow_cmd_setpoint:
    label: "cmd_setpoint"
    source: proc_compute_balance
    target: proc_dispatch_commands
    kind: control
    level: 1
    notes: "Battery max-charge / grid-setpoint commands."

  flow_cmd_inverter_limit:
    label: "cmd_inverter_limit"
    source: proc_compute_balance
    target: proc_dispatch_commands
    kind: control
    level: 1
    notes: "Inverter throttle (only if OpenDTU + F2 active)."

  flow_event_alert:
    label: "event_alert"
    source: proc_compute_balance
    target: proc_serve_ui
    kind: control
    level: 1
    notes: "Threshold-driven alert events. Generated by brain per Decision 5."

  flow_event_override:
    label: "event_override"
    source: proc_handle_user_input
    target: proc_compute_balance
    kind: control
    level: 1
    notes: "Manual override events from owner — bypass or coerce the brain's decisions."

  flow_event_config:
    label: "event_config"
    source: proc_handle_user_input
    target: proc_acquire_telemetry
    kind: control
    level: 1
    notes: "Configuration changes (e.g., polling cadence, channel enablement)."

# ─────────────────────────────────────────────────────────────────────
# TRANSITIONS — state-machine transitions inside CSPECs
# Each transition belongs to a parent_machine (the process whose CSPEC
# contains it). Source/target reference state entities.
# ─────────────────────────────────────────────────────────────────────
transitions:

  # ─── Energy Manager CSPEC (proc_compute_balance) — locked 2026-05-22 ───

  tx_init_to_grid:
    label: "telemetry healthy"
    source_state: state_initializing
    target_state: state_grid_tie
    parent_machine: proc_compute_balance
    event: "telemetry healthy + Victron mode = grid-tie"
    action: "enable Acquire Telemetry; arm 1 Hz tick"

  tx_init_to_fault:
    label: "startup failure"
    source_state: state_initializing
    target_state: state_telemetry_fault
    parent_machine: proc_compute_balance
    event: "telemetry timeout at startup"
    action: "emit event_alert (startup-fault)"

  tx_idle_to_diverting:
    label: "surplus detected"
    source_state: state_idle
    target_state: state_diverting
    parent_machine: proc_compute_balance
    event: "net_grid_power < -threshold"
    action: "start raising battery max_charge_current"

  tx_diverting_to_idle:
    label: "balance reached"
    source_state: state_diverting
    target_state: state_idle
    parent_machine: proc_compute_balance
    event: "|net_grid_power| < deadband"
    action: "hold current setpoint"

  tx_diverting_to_holding:
    label: "SoC ≥ max"
    source_state: state_diverting
    target_state: state_holding
    parent_machine: proc_compute_balance
    event: "battery_soc >= max_soc"
    action: "clamp max_charge_current to zero"

  tx_holding_to_diverting:
    label: "surplus + headroom"
    source_state: state_holding
    target_state: state_diverting
    parent_machine: proc_compute_balance
    event: "surplus persists AND battery_soc < (max_soc - hysteresis)"
    action: "resume diversion"

  tx_idle_to_discharging:
    label: "night import"
    source_state: state_idle
    target_state: state_discharging
    parent_machine: proc_compute_balance
    event: "net-import in night-rate window"
    action: "set Victron grid_setpoint to track ≈ 0"

  tx_discharging_to_idle:
    label: "SoC ≤ min / sun returns"
    source_state: state_discharging
    target_state: state_idle
    parent_machine: proc_compute_balance
    event: "battery_soc ≤ min_soc OR sun rising"
    action: "clear grid_setpoint; resume Idle"

  tx_gridtie_to_island:
    label: "Victron → island"
    source_state: state_grid_tie
    target_state: state_island
    parent_machine: proc_compute_balance
    event: "Victron reports mode == island"
    action: "disable Cloud Forward; clamp Dispatch Commands to safe defaults"

  tx_island_to_gridtie:
    label: "Victron → grid-tie"
    source_state: state_island
    target_state: state_grid_tie
    parent_machine: proc_compute_balance
    event: "Victron reports mode == grid-tie"
    action: "re-enable Cloud Forward (if configured)"

  tx_battery_to_solar:
    label: "sun present"
    source_state: state_battery_discharge
    target_state: state_ac_coupled_solar
    parent_machine: proc_compute_balance
    event: "sun rising + Victron AC-couples inverters"
    action: "observe (no commands; Victron's frequency-shift drives)"

  tx_solar_to_battery:
    label: "sun gone / battery saturating"
    source_state: state_ac_coupled_solar
    target_state: state_battery_discharge
    parent_machine: proc_compute_balance
    event: "sun setting OR battery saturating"
    action: "state change only; Victron handles physics"

  tx_gridtie_to_fault:
    label: "fault event"
    source_state: state_grid_tie
    target_state: state_fault
    parent_machine: proc_compute_balance
    event: "fault event of any category"
    action: "emit event_alert (fault); clamp to safe defaults"

  tx_island_to_fault:
    label: "fault event"
    source_state: state_island
    target_state: state_fault
    parent_machine: proc_compute_balance
    event: "fault event of any category"
    action: "emit event_alert (fault); clamp to safe defaults"

  tx_fault_to_gridtie:
    label: "cleared + grid present"
    source_state: state_fault
    target_state: state_grid_tie
    parent_machine: proc_compute_balance
    event: "fault cleared + Victron mode = grid-tie"
    action: "resume normal operation in GridTie"

  tx_fault_to_island:
    label: "cleared + grid absent"
    source_state: state_fault
    target_state: state_island
    parent_machine: proc_compute_balance
    event: "fault cleared + Victron mode = island"
    action: "resume normal operation in Island"

# ─────────────────────────────────────────────────────────────────────
# EDGES — non-data physical or implicit connections shown in diagrams
# for context but not modeled as flows.
# ─────────────────────────────────────────────────────────────────────
edges:

  edge_grid_to_inverters:
    label: "AC power"
    source: term_grid
    target: term_inverters
    kind: physical_ac_power
    level: 0
    notes: "Physical AC power line. Not modeled as a flow; shown for context."

  edge_grid_to_battery:
    label: "AC power"
    source: term_grid
    target: term_battery_system
    kind: physical_ac_power
    level: 0
    notes: |
      Physical AC power line via Victron AC-IN. AC-coupled microgrid
      during outages (Battery System generates micro-grid; Solar Inverters
      stay alive via frequency-shift throttling).


# ─── Stage 4 — PSPECs (leaf-process functional contracts) ───
# Format: 2000 Fig 4.46 (INPUTS / OUTPUTS / TRANSFORMATION).
# Source: see toolkit/PSPEC_DESIGN.md.

pspecs:

  pspec_acquire_telemetry:
    parent_process: proc_acquire_telemetry
    transformation:
      style: textual
      body: |
        Each ingest cycle:
          Read F1 PER CHANNEL TELEMETRY from the inverter side via the
          configured DTU adapter (DTU-Pro-S, OpenDTU, or AhoyDTU).
          Read F3 NET GRID POWER V I PF from the grid-tied power meter
          via Modbus RTU.
          Read F4 SOC MODE AC IN from the battery system via MQTT or
          Modbus TCP.
        On receipt of EVENT CONFIG:
          Apply the new configuration values (sample rates, source
          selection, scaling).
        Normalize all readings into the canonical NORMALIZED STATE shape
        and write it to store_system_state.
    computational_constraints:
      frequency: "≥ 1 Hz aggregate ingest rate; ≥ 0.5 Hz per source"
      timing: "End-to-end ingest → store_system_state write latency < 1 s"
    comments: |
      Sole writer into the telemetry portion of the store. Vendor adapter
      details and reconnection policy live in the architecture model,
      not here (PSPECs specify what, not how — 1988 §13.1).

  pspec_dispatch_commands:
    parent_process: proc_dispatch_commands
    transformation:
      style: textual
      body: |
        On receipt of CMD SETPOINT:
          Translate the desired inverter power-limit setpoint into the
          vendor-specific frame and issue F2 POWER LIMIT SETPOINTS to
          the inverter side via the configured DTU adapter.
        On receipt of CMD INVERTER LIMIT:
          Translate the desired battery charge / grid-setpoint command
          and issue F5 MAX CHARGE GRID SETPOINT to the battery system
          via MQTT publish.
    computational_constraints:
      timing: "Command → actuator latency < 500 ms"
      accuracy: "Translated values honor command to within vendor protocol resolution"
    comments: |
      Adapter logic. The "issue" keyword in the body marks F2 and F5 as
      time-transient (1988 §13.3) — each command propagates once, not
      held by this bubble.

  pspec_serve_ui:
    parent_process: proc_serve_ui
    transformation:
      style: textual
      body: |
        Render F7 DASHBOARDS ALERTS combining:
          the current SYSTEM STATE (power flows, SoC, mode, recent
          history),
          and any EVENT ALERT received from the Energy Manager.
        Provide drill-in views for inverter-side, grid-side, and
        battery-side detail.
    computational_constraints:
      frequency: "Dashboard refresh ≥ 1 Hz; alert latency < 500 ms"
    comments: |
      Read-only presentation. No commands originate here; user actions
      go through proc_handle_user_input.

  pspec_handle_user_input:
    parent_process: proc_handle_user_input
    transformation:
      style: textual
      body: |
        On receipt of F6 CONFIG OVERRIDE from the angler / owner:
          Classify the input:
            - structural changes (setpoints, source enable/disable,
              policy thresholds) → issue EVENT CONFIG;
            - immediate operational overrides (manual mode, enable/
              disable, force-recompute) → issue EVENT OVERRIDE.
          Apply input validation; reject malformed inputs.
    computational_constraints:
      timing: "Input → emitted event latency < 200 ms"
    comments: |
      Owner-facing input gateway. Both EVENT CONFIG and EVENT OVERRIDE
      are transient (1988 §13.3) — the "issue" keyword reflects that.

  pspec_cloud_forward:
    parent_process: proc_cloud_forward
    transformation:
      style: textual
      body: |
        If cloud forwarding is enabled by configuration:
          Subscribe to changes in SYSTEM STATE and issue
          F8 OPTIONAL TELEMETRY FORWARD to S-Miles Cloud at the
          configured cadence.
        Otherwise, do nothing.
    computational_constraints:
      frequency: "Configurable; default 1/min when enabled"
      timing: "Best-effort; not in the diversion-control critical path"
    comments: |
      Optional bubble (per Stage 1 Decision 5). The "issue" keyword marks
      F8 as time-transient — each posting is a single event, not a held
      output (1988 §13.3).
