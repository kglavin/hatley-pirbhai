# AutoFishingRig — Naming Dictionary
#
# HP's Requirements Dictionary for the second toolkit dogfood project.
# Tests transferability of the schema and renderers outside the solar
# domain. Stage 1 (level-0 Context) only; further levels added as the
# project advances.

project: AutoFishingRig
version: "0.1"
last_updated: 2026-05-22

entities:

  # ─── Level 0 — system + external terminators ───

  sys_root:
    kind: system
    label: "AutoFishingRig"
    level: 0
    description: |
      An automated fishing rig — a controller + sensor + reel that
      detects a fish bite via line-tension spike and reels the fish
      in. Manually cast; automatic from tension-setup through landing.

  term_angler:
    kind: terminator
    label: "Angler"
    level: 0
    description: |
      The human operator. Casts the bait manually, places the rod in
      the holder, configures the system (tension setpoint, bite
      threshold, hook-set delay), arms it, monitors status, and
      receives alerts on bite/hook/landed/fault.

  term_line:
    kind: terminator
    label: "Hook & Line"
    level: 0
    description: |
      The physical line + hook + bait that connects the system to the
      fish. The system observes the line via tension feedback (F3) and
      actuates it via reel torque (F4). The line is also where the
      fish acts (see edge_fish_to_line).

  term_fish:
    kind: terminator
    label: "Fish"
    level: 0
    description: |
      External actor — the thing the system is trying to detect and
      land. Doesn't communicate with the system directly; acts on the
      line, which the system observes via tension.

  term_power:
    kind: terminator
    label: "Power Source"
    level: 0
    description: |
      Battery or other DC power source. Modeled as a physical edge for
      context; no data flows about battery state at this level (could
      be added later if low-battery alerting becomes a requirement).

  term_cloud:
    kind: terminator
    label: "Cloud Logger"
    level: 0
    optional: true
    description: |
      Optional remote logging service for catch records / telemetry.
      Off by default; angler enables if desired. Same shape as solar's
      S-Miles Cloud terminator.

  # ─── Level 1 — internal processes (children of sys_root) ───
  # Decomposition locked 2026-05-22 via 01-level1/proposal.md.
  # Working names pending naming review.

  proc_acquire_tension:
    kind: process
    label: "Acquire Tension"             # working name
    level: 1
    parent: sys_root
    description: |
      Reads the line-tension sensor (analog) at 50–200 Hz, normalizes /
      filters, writes samples + recent-history buffer into System State.
      Single writer to the tension portion of the store.

  proc_bite_detector:
    kind: process
    label: "Bite Detector"               # working name
    level: 1
    parent: sys_root
    needs_cspec: true
    description: |
      The brain. Owns the fishing state machine (idle → arming → armed →
      bite-detected → hook-setting → hooked → reeling-in → landed →
      fault). Reads tension via System State; emits motor commands to
      Reel Controller; emits alerts to Serve UI. Manages thresholds,
      hysteresis, timers, and fault response (per Decision 6).
      State-rich → CSPEC at Stage 3.

  proc_reel_controller:
    kind: process
    label: "Reel Controller"             # working name
    level: 1
    parent: sys_root
    description: |
      Drives the reel motor — translates internal motor commands (direction,
      torque, speed) into PWM / driver signals. Enforces safety limits
      (max current, stall detection); may report back via the store.

  proc_serve_ui:
    kind: process
    label: "Serve UI"                    # working name
    level: 1
    parent: sys_root
    description: |
      Presentation. Renders status + current tension + recent events;
      surfaces alerts. Accepts angler config (tension setpoint, bite
      threshold, hook-set delay) and arm/disarm/override commands.

  proc_cloud_forward:
    kind: process
    label: "Cloud Forward"               # working name
    level: 1
    parent: sys_root
    optional: true
    description: |
      Optional remote logging of catch events + session telemetry.
      Off by default; angler enables.

  # ─── Level 1 — data stores ───

  store_system_state:
    kind: data_store
    label: "System State"                # working name
    level: 1
    parent: sys_root
    description: |
      Holds the latest tension sample + a small recent-history buffer
      (per Decision 2) plus the current operational state and last
      event. Single writer (Acquire Tension); multiple readers
      (Bite Detector, Serve UI, optionally Cloud Forward).

  # ─── Level 2 (CSPEC) — states inside proc_bite_detector ───
  # Locked 2026-05-22 via cspecs/bite-detector/proposal.md.
  # Flat structure (no composites) — sequence is linear.

  state_initializing:
    kind: state
    label: "Initializing"
    level: 2
    parent: proc_bite_detector
    is_initial: true
    description: "Startup self-test. Verify motor and sensor are responsive."

  state_idle:
    kind: state
    label: "Idle"
    level: 2
    parent: proc_bite_detector
    description: "Disarmed; awaiting angler to arm the rig."

  state_tightening:
    kind: state
    label: "Tightening"
    level: 2
    parent: proc_bite_detector
    description: "After arm: actively pulling the line to the configured tension setpoint."

  state_armed:
    kind: state
    label: "Armed"
    level: 2
    parent: proc_bite_detector
    description: "Line at tension setpoint; watching for a bite spike."

  state_bite_detected:
    kind: state
    label: "BiteDetected"
    level: 2
    parent: proc_bite_detector
    description: "Tension spike observed; brief delay before setting the hook (let fish swallow)."

  state_setting_hook:
    kind: state
    label: "SettingHook"
    level: 2
    parent: proc_bite_detector
    description: "Sharp reel-in command to drive the hook home."

  state_reeling:
    kind: state
    label: "Reeling"
    level: 2
    parent: proc_bite_detector
    description: "Fish hooked; reeling in at controlled speed."

  state_landed:
    kind: state
    label: "Landed"
    level: 2
    parent: proc_bite_detector
    description: "Line fully in; fish landed. Awaits manual reset by angler."

  state_fault:
    kind: state
    label: "Fault"
    level: 2
    parent: proc_bite_detector
    description: |
      Fault state — captures sensor disconnect, motor stall, configuration
      error, or any safety violation. Category recorded as data attribute;
      recovery requires explicit angler reset.

flows:

  # ─── Level 0 — boundary flows ───

  flow_f1_angler_config:
    label: "F1: config, arm/disarm"
    source: term_angler
    target: sys_root
    refined_target: proc_serve_ui        # internal endpoint at level 1
    kind: "data+control"
    medium: "UI"
    level: 0
    notes: |
      Tension setpoint, bite threshold, hook-set delay, max reel speed,
      arm/disarm commands. Mostly config; arm/disarm are control events.

  flow_f2_status:
    label: "F2: status, alerts"
    source: sys_root
    target: term_angler
    refined_source: proc_serve_ui
    kind: data
    medium: "UI"
    level: 0
    notes: "Current state, tension reading, alerts (bite, hooked, landed, fault)."

  flow_f3_tension:
    label: "F3: tension feedback"
    source: term_line
    target: sys_root
    refined_target: proc_acquire_tension
    kind: data
    medium: "analog sensor → ADC"
    level: 0
    notes: "Line tension reading. Primary sensing input for the bite-detection state machine."

  flow_f4_torque:
    label: "F4: reel torque cmd"
    source: sys_root
    target: term_line
    refined_source: proc_reel_controller
    kind: control
    medium: "motor driver"
    level: 0
    notes: "Reel motor torque + direction. Drives the line in/out per current state."

  flow_f6_catch_log:
    label: "F6: catch log"
    source: sys_root
    target: term_cloud
    refined_source: proc_cloud_forward
    kind: data
    medium: "HTTPS"
    level: 0
    optional: true
    notes: "Optional telemetry / catch event log."

  # ─── Level 1 — internal flows (between processes / through the store) ───
  # Style per Decision 5: event-driven for alerts + transitions; periodic
  # (50–200 Hz) for tension sampling.

  flow_tension_to_state:
    label: "tension samples"
    source: proc_acquire_tension
    target: store_system_state
    kind: data
    level: 1
    notes: "Sole writer path into store_system_state for tension data."

  flow_state_to_brain:
    label: "system_state"
    source: store_system_state
    target: proc_bite_detector
    kind: data
    level: 1
    notes: "Brain reads current state + recent tension history for spike detection."

  flow_state_to_ui:
    label: "system_state"
    source: store_system_state
    target: proc_serve_ui
    kind: data
    level: 1

  flow_state_to_cloud:
    label: "system_state"
    source: store_system_state
    target: proc_cloud_forward
    kind: data
    level: 1
    optional: true

  flow_motor_command:
    label: "motor cmd"
    source: proc_bite_detector
    target: proc_reel_controller
    kind: control
    level: 1
    notes: "Direction + torque + speed limit, per current state."

  flow_alert:
    label: "event_alert"
    source: proc_bite_detector
    target: proc_serve_ui
    kind: control
    level: 1
    notes: "Threshold-driven alerts: bite, hooked, landed, fault."

  flow_override:
    label: "event_override"
    source: proc_serve_ui
    target: proc_bite_detector
    kind: control
    level: 1
    notes: "Angler config + arm/disarm + manual overrides."

# ─────────────────────────────────────────────────────────────────────
# TRANSITIONS — Bite Detector CSPEC (locked 2026-05-22)
# Flat state machine; 18 transitions.
# ─────────────────────────────────────────────────────────────────────
transitions:

  tx_init_to_idle:
    label: "self-test passed"
    source_state: state_initializing
    target_state: state_idle
    parent_machine: proc_bite_detector
    event: "Initializing complete; motor + sensor responsive"
    action: "enable Acquire Tension at low-rate sampling"

  tx_init_to_fault:
    label: "startup failure"
    source_state: state_initializing
    target_state: state_fault
    parent_machine: proc_bite_detector
    event: "self-test failed (sensor or motor unresponsive)"
    action: "emit event_alert (startup-fault)"

  tx_idle_to_tightening:
    label: "armed by angler"
    source_state: state_idle
    target_state: state_tightening
    parent_machine: proc_bite_detector
    event: "event_override: arm"
    action: "switch Acquire Tension to high-rate; enable Reel Controller (slow pull)"

  tx_tightening_to_armed:
    label: "tension at setpoint"
    source_state: state_tightening
    target_state: state_armed
    parent_machine: proc_bite_detector
    event: "tension ≥ tension_setpoint"
    action: "disable Reel Controller; emit alert (armed)"

  tx_tightening_to_idle:
    label: "disarmed during tighten"
    source_state: state_tightening
    target_state: state_idle
    parent_machine: proc_bite_detector
    event: "event_override: disarm"
    action: "disable Reel Controller; release tension"

  tx_armed_to_bite:
    label: "tension spike"
    source_state: state_armed
    target_state: state_bite_detected
    parent_machine: proc_bite_detector
    event: "tension > bite_threshold (rising)"
    action: "start hook_set_delay timer; emit alert (bite)"

  tx_armed_to_tightening:
    label: "slack detected"
    source_state: state_armed
    target_state: state_tightening
    parent_machine: proc_bite_detector
    event: "tension < (tension_setpoint - slack_hysteresis)"
    action: "re-enable Reel Controller (slow pull); resume tighten"

  tx_armed_to_idle:
    label: "disarmed"
    source_state: state_armed
    target_state: state_idle
    parent_machine: proc_bite_detector
    event: "event_override: disarm"
    action: "release tension; back to low-rate sampling"

  tx_bite_to_setting:
    label: "after hook_set_delay"
    source_state: state_bite_detected
    target_state: state_setting_hook
    parent_machine: proc_bite_detector
    event: "hook_set_delay timer expires"
    action: "enable Reel Controller (sharp pull); start settle-window timer"

  tx_bite_to_armed:
    label: "false bite"
    source_state: state_bite_detected
    target_state: state_armed
    parent_machine: proc_bite_detector
    event: "tension drops below bite_threshold during hook_set_delay"
    action: "cancel hook_set_delay timer; emit alert (false-bite)"

  tx_setting_to_reeling:
    label: "fish confirmed"
    source_state: state_setting_hook
    target_state: state_reeling
    parent_machine: proc_bite_detector
    event: "after settle-window: tension still > hook_set_threshold"
    action: "switch Reel Controller to landing-reel speed; emit alert (hooked)"

  tx_setting_to_armed:
    label: "missed strike"
    source_state: state_setting_hook
    target_state: state_armed
    parent_machine: proc_bite_detector
    event: "after settle-window: tension dropped below threshold"
    action: "stop Reel Controller; emit alert (missed-strike)"

  tx_reeling_to_landed:
    label: "line fully in"
    source_state: state_reeling
    target_state: state_landed
    parent_machine: proc_bite_detector
    event: "reel encoder at limit (line fully retrieved)"
    action: "stop Reel Controller; emit alert (landed); enable Cloud Forward if configured"

  tx_reeling_to_fault:
    label: "line slack or motor stall"
    source_state: state_reeling
    target_state: state_fault
    parent_machine: proc_bite_detector
    event: "tension drops to zero OR motor stall detected"
    action: "stop Reel Controller; emit alert (fault-during-reel)"

  tx_landed_to_idle:
    label: "angler reset"
    source_state: state_landed
    target_state: state_idle
    parent_machine: proc_bite_detector
    event: "event_override: reset"
    action: "clear catch state; back to low-rate sampling"

  tx_idle_to_fault:
    label: "fault event"
    source_state: state_idle
    target_state: state_fault
    parent_machine: proc_bite_detector
    event: "any fault category detected (sensor / motor / config)"
    action: "emit event_alert (fault)"

  tx_armed_to_fault:
    label: "fault event"
    source_state: state_armed
    target_state: state_fault
    parent_machine: proc_bite_detector
    event: "any fault category detected during armed monitoring"
    action: "stop Reel Controller; emit event_alert (fault)"

  tx_fault_to_idle:
    label: "fault cleared + reset"
    source_state: state_fault
    target_state: state_idle
    parent_machine: proc_bite_detector
    event: "event_override: reset + fault category cleared"
    action: "resume normal operation in Idle"

edges:

  # ─── Level 0 — non-data physical edges ───

  edge_power_to_sys:
    label: "DC power"
    source: term_power
    target: sys_root
    kind: physical_dc_power
    level: 0
    notes: "Battery powers the controller and motor."

  edge_fish_to_line:
    label: "bite / fight"
    source: term_fish
    target: term_line
    kind: physical_interaction
    level: 0
    notes: |
      The fish pulls/strikes the line; this manifests to the system as
      a tension change (observed via F3). The system never communicates
      with the fish directly; this edge is shown for context — it's the
      world-side phenomenon the system is trying to detect.


# ─── Stage 4 — PSPECs (leaf-process functional contracts) ───
# Format: 2000 Fig 4.46 (INPUTS / OUTPUTS / TRANSFORMATION).
# Source: see toolkit/PSPEC_DESIGN.md.

pspecs:

  pspec_acquire_tension:
    parent_process: proc_acquire_tension
    transformation:
      style: textual
      body: |
        Every sampling cycle:
          Read F3 TENSION from the analog input.
          Convert to engineering units using the sensor calibration.
          Update TENSION SAMPLES in store_system_state with the latest value
          and append it to the recent-history buffer (retain N most recent).
    computational_constraints:
      frequency: "50–200 Hz sampling rate (configurable; default 100 Hz)"
      accuracy: "±1% of measured tension"
      timing: "Sample → store_system_state write latency < 5 ms"
    comments: |
      First-cut PSPEC. Recent-history buffer size N pending Stage 5 sizing —
      see TSPEC notes once that artifact exists.
    # ─── Modernization #25 — V&V ───
    verification:
      methods: [test, analysis]
      coverage_target: 95.0
      validation_scenarios:
        - "Sustained 200 Hz sampling for 10 minutes without buffer overflow"
        - "Calibration drift < 0.5% over 24-hour soak test"
        - "Recovery from transient ADC fault within one sample period"
    # ─── Modernization #1 — runtime observability ───
    observability:
      metrics:
        - { name: "tension_samples_total", kind: counter, description: "Total tension samples acquired" }
        - { name: "tension_newtons", kind: gauge, unit: N, description: "Latest tension reading in Newtons" }
        - { name: "tension_adc_read_seconds", kind: histogram, unit: s, description: "ADC read latency" }
      traces:
        - { span: "tension.acquire_cycle", description: "One full sample-and-write cycle" }
      logs:
        - { category: "tension.calibration", level: info }
      alerts:
        - name: tension_sensor_stuck
          when: "rate(tension_samples_total[1m]) == 0"
          severity: warning
          runbook: runbooks/tension-sensor-stuck.md
          escalation_after_min: 15

  pspec_reel_controller:
    parent_process: proc_reel_controller
    transformation:
      style: textual
      body: |
        On receipt of MOTOR CMD:
          Decode direction, target torque, and speed.
          Enforce safety limits — max current, stall threshold, and max
          continuous run time.
          Drive the reel actuator via F4 REEL TORQUE CMD with the bounded
          torque value at the requested direction.
          When stall or current limit is reached, hold torque at the
          enforced limit until MOTOR CMD changes.
    computational_constraints:
      timing: "MOTOR CMD → F4 REEL TORQUE CMD latency < 10 ms"
      accuracy: "Commanded torque honored to within ±5% under non-saturated load"
    comments: |
      Safety limits live in this PSPEC; the bite-detection state machine
      (CSPEC for Bite Detector) trusts that they are enforced here.

  pspec_serve_ui:
    parent_process: proc_serve_ui
    transformation:
      style: textual
      body: |
        Render F2 STATUS ALERTS from the current SYSTEM STATE
        (tension samples + bite-detection mode + reel state) and from
        any EVENT ALERT received.
        Display F1 CONFIG ARM DISARM controls to the angler.
        On angler override actions taken in the UI (manual cast/reel,
        disarm), emit EVENT OVERRIDE.
    computational_constraints:
      frequency: "UI refresh ≥ 10 Hz; alert latency < 100 ms"
    comments: |
      Presentation layer. Decisions about which alerts to surface vs
      suppress live with the user; this PSPEC just renders what arrives.

  pspec_cloud_forward:
    parent_process: proc_cloud_forward
    transformation:
      style: textual
      body: |
        If cloud forwarding is enabled by configuration:
          When SYSTEM STATE indicates a completed catch or session event,
          issue F6 CATCH LOG containing the relevant fields (timestamp,
          tension peak, bite-to-set delay, reel-in duration).
        Otherwise, do nothing.
    computational_constraints:
      timing: "Best-effort; not in the bite-detection critical path"
    comments: |
      Optional bubble. The "issue" keyword in the body marks F6 CATCH LOG
      as time-transient (1988 §13.3) — emitted once per event, not held.


# ─── Stage 5 — Architecture Model ───
# Format: 2000 §4.2 (AFD + AID + AMS + AIS + allocation).
# Source: see toolkit/ARCH_DESIGN.md.

architecture_modules:

  am_controller:
    name: "Main Controller Board"
    module_number: "AM 1"
    kind: hardware
    description: |
      ESP32-based main board. Carries the tension-sampling ADC, the motor
      driver, BLE radio, and optional WiFi/HTTPS for cloud forwarding.
      Hosts the on-device firmware that runs the bite-detection state
      machine, motor control, telemetry acquisition, and cloud bridging.
    allocated_processes:
      - proc_acquire_tension
      - proc_reel_controller
      - proc_cloud_forward
    allocated_cspecs:
      - proc_bite_detector
    allocated_stores:
      - store_system_state
    trust_zone: privileged             # modernization #8.1 — owns motor + sensor

  am_angler_app:
    name: "Angler Mobile App"
    module_number: "AM 2"
    kind: software
    description: |
      iOS/Android mobile app. Connects to the controller over BLE. Presents
      status + tension + recent events; accepts angler config, arm/disarm,
      and manual overrides.
    allocated_processes:
      - proc_serve_ui
    trust_zone: internal_lan           # modernization #8.1 — angler-held device

architecture_flows:

  af_telemetry_to_app:
    name: "telemetry"
    source: am_controller
    target: am_angler_app
    kind: data
    physical_description: |
      JSON-encoded BLE GATT notifications; ~10 Hz aggregated sample +
      event stream.
    allocated_flows:
      - flow_state_to_ui
      - flow_alert
      - flow_f2_status
    synchronicity: push_notification   # modernization #2 — controller pushes
    delivery: at_most_once             # BLE GATT notifications are not retried

  af_config_to_ctrl:
    name: "angler config + override"
    source: am_angler_app
    target: am_controller
    kind: data
    physical_description: |
      BLE GATT writes from the app. Arm/disarm, thresholds, manual
      reel commands.
    allocated_flows:
      - flow_f1_angler_config
      - flow_override
    synchronicity: sync_request_response   # modernization #2 — write + ack
    delivery: at_least_once

architecture_interconnects:

  ai_ble:
    name: "BLE Link"
    endpoints: [am_controller, am_angler_app]
    carries: [af_telemetry_to_app, af_config_to_ctrl]
    description: |
      Bluetooth Low Energy 5.0 link between the controller and the angler
      app. Custom GATT service carries telemetry notifications and
      config writes.
    auth_required: paired_device       # modernization #8.1 — BLE pairing required
    encryption: bluetooth_le_secure    # BLE 5.0 LE Secure Connections
    # ─── Modernization #8.2 — STRIDE threat model ───
    stride_mitigations:
      spoofing: |
        Paired-device pairing (BLE LE Secure Connections, P-256 ECDH) prevents
        unauthorized peripherals from impersonating the controller. The first
        pairing is in-person (proximity-based); subsequent reconnections use
        the bonded long-term key.
      tampering: |
        BLE 5.0 LE Secure Connections provides AES-CCM authenticated
        encryption on every link-layer packet. In-flight tampering would
        invalidate the MIC and drop the packet.
      repudiation: |
        out_of_scope — single-user session; no third-party audit requirement.
      info_disclosure: |
        AES-CCM encryption per BLE 5.0. Telemetry contains fishing-session
        data only (no PII beyond the angler's pairing key, which is a
        random bond).
      denial_of_service: |
        Rate-limit pairing attempts to mitigate pairing-storm DoS. Reconnect
        backoff (exponential, capped) prevents reconnect-flood. The motor
        + sensor remain locally authoritative if BLE drops — degraded mode
        but no safety impact.
      elev_of_privilege: |
        Custom GATT service exposes only telemetry-notify and config-write
        characteristics. No firmware-update path over BLE (firmware updates
        require physical USB connection — explicit design choice).

architecture_module_specs:

  ams_controller:
    parent_module: am_controller
    description: |
      ESP32-WROOM-32 module on a custom PCB. Onboard: 16-bit ADC for the
      tension load cell, H-bridge motor driver for the reel, BLE
      antenna, optional WiFi for cloud. Firmware is FreeRTOS + the HP
      toolkit-derived CSPEC/PSPEC implementations.
    design_rationale: |
      Chose ESP32 over a Cortex-M0+ for BLE + WiFi in a single package,
      simplifying both BoM and firmware. Onboard ADC avoids an external
      I2C ADC.
    design_justification: |
      MIPS budget: 200 Hz tension sampling + 20 Hz BLE notify + motor
      PWM is < 5% of ESP32 capacity at 80 MHz. RAM: state machine +
      recent-history buffer < 16 KB.
    required_constraints:
      reliability: "MTBF > 5000 hours of field operation."
      safety: "Motor cutoff on stall current (>2× nominal) within 50 ms."
      physical: "Fits in a 100×60×25 mm splashproof enclosure."
      cost: "BOM ≤ $45 in 100-unit lots."
    interfaces: |
      Inputs:  F3 TENSION (analog, 0–3.3V from load-cell amplifier);
               reel encoder feedback (quadrature, GPIO).
      Outputs: F4 REEL TORQUE CMD (PWM H-bridge);
               BLE GATT notifications (telemetry, alerts).
               WiFi/HTTPS (optional cloud forwarding).

  ams_angler_app:
    parent_module: am_angler_app
    description: |
      Cross-platform mobile app (Flutter). Pairs with the controller via
      BLE; presents a single-screen dashboard with live tension, mode
      indicator, recent-events list, and config controls.
    design_rationale: |
      Flutter chosen to ship one codebase to iOS and Android. BLE is
      the only required transport for first release; WiFi/cloud is
      out-of-scope for the app.
    design_justification: |
      UI refresh ≥ 10 Hz is trivial at the app's compute budget. BLE
      notifications drive the display directly with no polling.
    required_constraints:
      reliability: "Reconnects to controller within 5 s after BLE loss."
      physical: "Runs on iOS ≥ 15, Android ≥ 11."

architecture_interconnect_specs:

  ais_ble:
    parent_interconnect: ai_ble
    description: |
      BLE 5.0 GATT service connecting the controller to the angler app.
      The controller acts as peripheral; the app acts as central. One
      custom service exposes a telemetry notify characteristic and a
      config write characteristic.
    protocol_standard: |
      Bluetooth Core Specification 5.0. Custom GATT service UUID
      assigned per project; characteristic UUIDs documented in the
      app's protocol spec.
    design_rationale: |
      BLE chosen over classic Bluetooth or WiFi for low power on the
      controller side and simple pairing for the angler.
    required_constraints:
      timing: "Notification → app render latency < 100 ms (one BLE
        connection interval at 7.5 ms minimum)."
      physical: "Range ≥ 30 m line-of-sight; ≥ 10 m through a vest pocket."


# ─── Modernization #10 — Architecture Decision Records ───

adrs:

  adr_001_ble_transport:
    title: "BLE chosen for controller ↔ app transport"
    status: accepted
    date: 2026-05-22
    author: "controller team"
    context: |
      The controller needs a wireless link to the angler's mobile device
      that satisfies three constraints simultaneously: low controller-side
      power draw (battery-powered enclosure), simple no-account pairing
      (no cloud login required), and adequate range from a vest pocket.
      WiFi Direct, classic Bluetooth, and a custom 433 MHz radio were
      candidates.
    decision: |
      Use Bluetooth Low Energy 5.0 with a custom GATT service. BLE LE
      Secure Connections (P-256 ECDH) handles pairing + encryption;
      paired-device authentication is sufficient for the threat model
      (single-user session, no audit requirement).
    consequences: |
      - Controller-side power budget is met (~10 µA average BLE current).
      - Angler app must support BLE on iOS 15+ / Android 11+.
      - Range is range-limited to ~30 m line-of-sight, ~10 m through
        clothing. Acceptable for the angling use case.
      - Future expansion to remote-monitoring (cloud forwarding) is
        independent: the cloud_forward bubble uses WiFi/HTTPS, not BLE.
    alternatives:
      - "WiFi Direct — rejected: power budget on controller side."
      - "Classic Bluetooth — rejected: pairing UX worse than BLE; higher power."
      - "Custom 433 MHz LoRa-style radio — rejected: regulatory complexity, certification cost."
    affects:
      modules: [am_controller, am_angler_app]
      interconnects: [ai_ble]
      flows: [af_telemetry_to_app, af_config_to_ctrl]
    # ─── Modernization #8.3 — catalog references ───
    references_mitre_attack:
      - T1078       # Valid Accounts — addressed via paired-device bonding
      - T1565       # Data Manipulation — mitigated by AES-CCM
    references_cwe:
      - CWE-319     # Cleartext Transmission of Sensitive Information — not applicable due to encryption
      - CWE-294     # Authentication Bypass by Capture-replay — mitigated by LE Secure Connections nonces


# ─── Modernization #21 / #22 — Budgets + TPMs ───

budgets:

  budget_bite_to_set_latency:
    name: "Bite detection → hook-set latency (end-to-end)"
    unit: ms
    system_target: 200
    system_reserve: 30                 # margin held at system level
    allocations:
      am_controller: 170               # ADC sample + bite detect + motor command
      # am_angler_app gets 0 — it's not in the bite-to-set critical path
    notes: |
      The hook-set sequence is timing-critical: tension spike → fish swallow →
      drive the hook home. Total delay must fit within the fish's bite-and-
      release window (~250 ms for typical species). System target of 200 ms
      with 30 ms reserve leaves 170 ms for the controller's critical-path
      processing.

  budget_telemetry_to_app_latency:
    name: "Telemetry → app render latency (informational; not safety-critical)"
    unit: ms
    system_target: 300
    system_reserve: 50
    allocations:
      am_controller: 100               # acquire + format + BLE notify
      am_angler_app: 150               # BLE receive + render

tpms:

  tpm_bite_to_set_currently:
    name: "Measured bite-to-set latency (lab bench)"
    unit: ms
    threshold: 200                     # = budget_bite_to_set_latency.system_target
    target: 150                        # aim for
    current_estimate: 165
    growth_allowance: 35               # 200 - 165
    measurement_method: "Histogram of `bite_to_set_ms` metric over 30-day bench window"
    derived_from_budget: budget_bite_to_set_latency
    trend_notes: |
      Currently 165 ms ± 12 ms (1σ) across 1,200 bench shots. Trend over
      last quarter: +3 ms/quarter (improving — moved tension-sample loop
      from 100 Hz to 200 Hz, reducing detect-latency variance).

  tpm_ble_link_uptime:
    name: "BLE link uptime"
    unit: percent
    direction: more_is_better          # threshold is a floor
    threshold: 99.0                    # don't-drop-below
    target: 99.5
    current_estimate: 99.2
    growth_allowance: 0.2              # safe down to 99.0 (current − growth)
    measurement_method: "1 - (sum(ble_disconnect_seconds) / sum(session_seconds))"
    trend_notes: |
      Field beta: 99.2% uptime over 50 fishing sessions. Drops correlate
      with vest-pocket angle (signal blocked). Mitigation: improve
      antenna orientation in next enclosure rev.


# ─── Modernization #32 — SLOs ───

service_level_objectives:

  slo_bite_to_set_latency:
    name: "Bite detection → hook-set latency"
    sli:
      query: 'histogram_quantile(0.95, rate(bite_to_set_seconds_bucket[5m]))'
      unit: seconds
      description: "p95 latency from tension spike to motor command latch."
    target: 0.200                        # = budget_bite_to_set_latency.system_target (200ms)
    window: 7d
    error_budget_pct: 1.0                # 1% of bites may exceed 200ms over 7d
    applies_to:
      modules: [am_controller]
    sla: "Bite-to-set latency under 200 ms for 99% of detections over any 7-day window."
    derives_from_tpm: tpm_bite_to_set_currently
    runbook_on_burn: runbooks/slo-bite-to-set-burn.md
