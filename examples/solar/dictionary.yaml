# Solar Local Stack — Naming Dictionary
#
# HP's Requirements Dictionary in YAML form. This is the canonical source
# for entity identifiers and labels in the solar dogfood project.
# Artifacts (Mermaid, HTML, D2, SVGs) reference entities by their
# stable_id; rendering pulls labels from this file at render time.
#
# Rename = edit a label here, then regenerate dependent artifacts.
#
# Schema:
#   project, version, last_updated  — metadata
#   entities/<id>                   — system, terminators, processes (bubbles)
#   flows/<id>                      — data and control flows
#   edges/<id>                      — non-data edges (e.g., physical AC)
#
# Each entity carries: kind, label, level, description, optional fields.
# Each flow carries:   source, target, kind, medium, level, optional notes.

project: Solar Local Stack
version: "0.1"
last_updated: 2026-05-22

# ─────────────────────────────────────────────────────────────────────
# ENTITIES — the system and its terminators (level 0); internal bubbles
# at higher levels get added here as decomposition proceeds.
# ─────────────────────────────────────────────────────────────────────
entities:

  sys_root:
    kind: system
    label: "Solar Local Stack"
    level: 0
    description: |
      The orchestration software + local telemetry abstraction layer —
      the system under design. Replaces dependence on Hoymiles S-Miles
      Cloud. Implements dynamic excess-solar diversion, auto-discharge at
      night, and outage coordination with the Battery System.

  term_inverters:
    kind: terminator
    label: "Solar Inverters"
    level: 0
    description: |
      Microinverters (Hoymiles HMS-2000-4T-NA) performing per-channel
      MPPT and DC-AC conversion. Telemetry via Sub-1G RF to a DTU or
      OpenDTU/AhoyDTU gateway.

  term_meter:
    kind: terminator
    label: "Net Power Meter"
    level: 0
    description: |
      Utility-grade smart meter (Chint DTSU666) sensing net grid power
      direction over RS485 Modbus RTU. Primary sensor for the diversion
      loop — its sign tells the system whether the house is exporting
      or importing.

  term_battery_system:
    kind: terminator
    label: "Battery System"
    level: 0
    description: |
      Battery inverter-charger plus GX gateway (Victron MultiPlus + Cerbo
      GX). Two-way MQTT and Modbus TCP. Handles outage transfer (<20 ms)
      and ESS night-discharge natively via Venus OS.

  term_grid:
    kind: terminator
    label: "Utility Grid"
    level: 0
    description: |
      External utility (PG&E) under zero-export tariff. Observed via the
      Net Power Meter; not addressed by the system directly. Compliance:
      PG&E non-export rule + NEC 690.12 rapid shutdown.

  term_user:
    kind: terminator
    label: "Owner"
    level: 0
    description: |
      The homeowner. Configures the system, issues manual overrides,
      reviews dashboards, receives alerts.

  term_smiles_cloud:
    kind: terminator
    label: "S-Miles Cloud"
    level: 0
    optional: true
    description: |
      Hoymiles cloud monitoring platform. Optional terminator — off by
      default; only used if the owner wants belt-and-suspenders cloud
      forwarding. The vendor name is kept in the label because the
      meaning of this terminator is specifically "the vendor cloud the
      system is replacing."

  # ─── Level 1 — internal processes (bubbles inside sys_root) ───
  # Decomposition locked 2026-05-22 via 01-level1/proposal.md.
  # Working names below pending the level-1 naming review.

  proc_acquire_telemetry:
    kind: process
    label: "Acquire Telemetry"          # working name
    level: 1
    parent: sys_root
    description: |
      Multi-protocol ingest layer. Owns the device-facing protocols
      (Sub-1G RF or OpenDTU, Modbus RTU, MQTT/Modbus TCP); normalizes
      raw frames into uniform internal data. Single writer to
      store_system_state.

  proc_compute_balance:
    kind: process
    label: "Energy Manager"             # renamed from "Compute Energy Balance" via naming-review
    level: 1
    parent: sys_root
    needs_cspec: true
    description: |
      The brain. Implements the diversion control loop, the night-
      discharge logic, and the outage handling (per Decision 2: outage
      is a mode of this bubble's CSPEC, not a separate process). State-
      rich → requires a CSPEC at the next stage. Also the source of
      alert events (per Decision 5).

  proc_dispatch_commands:
    kind: process
    label: "Dispatch Commands"          # working name
    level: 1
    parent: sys_root
    description: |
      Output-side adapter. Translates internal commands (cmd_setpoint,
      cmd_inverter_limit) into vendor-specific protocols and writes
      them to actuators.

  proc_serve_ui:
    kind: process
    label: "Serve UI"                   # working name
    level: 1
    parent: sys_root
    description: |
      Presentation. Renders dashboards from store_system_state, surfaces
      alerts emitted by proc_compute_balance.

  proc_handle_user_input:
    kind: process
    label: "Handle Input"               # renamed from "Handle User Input" via naming-review
    level: 1
    parent: sys_root
    description: |
      Owner-facing input — configuration, manual overrides, enable/
      disable.

  proc_cloud_forward:
    kind: process
    label: "Cloud Forward"              # working name
    level: 1
    parent: sys_root
    optional: true
    description: |
      Optional telemetry forward to S-Miles Cloud when enabled.
      Separated from proc_acquire_telemetry to make optionality
      explicit (per Decision 1, 5-bubble default kept the optional 6th).

  # ─── Level 1 — data stores ───

  store_system_state:
    kind: data_store
    label: "System State"               # working name
    level: 1
    parent: sys_root
    description: |
      Normalized, unified system-state snapshot. Per Decision 4, modeled
      as an explicit data store rather than implicit flows. Single
      writer (proc_acquire_telemetry); multiple readers
      (proc_compute_balance, proc_serve_ui, proc_cloud_forward).

  # ─── Level 2 (CSPEC) — states inside proc_compute_balance / "Energy Manager" ───
  # Locked 2026-05-22 via 01-level1/cspecs/compute-balance/proposal.md.
  # Hierarchical state machine per Decisions 1–3. Working state names
  # below pending naming-review for state names.

  state_initializing:
    kind: state
    label: "Initializing"
    level: 2
    parent: proc_compute_balance
    is_initial: true       # entry point of the entire CSPEC
    description: |
      Startup state. Waiting for telemetry and Victron mode to settle
      before entering normal operation.

  state_grid_tie:
    kind: state_composite
    label: "GridTie"
    level: 2
    parent: proc_compute_balance
    description: |
      Top-level normal-operation mode. Grid is present. Contains the
      diversion loop and night-discharge sub-states.

  state_idle:
    kind: state
    label: "Idle"
    level: 2
    parent: proc_compute_balance
    parent_state: state_grid_tie
    is_initial: true       # initial sub-state of GridTie
    description: "Balanced — no surplus to divert, no import to discharge against."

  state_diverting:
    kind: state
    label: "Diverting"
    level: 2
    parent: proc_compute_balance
    parent_state: state_grid_tie
    description: "Solar surplus detected; commanding Battery System to absorb it via increasing max-charge current."

  state_holding:
    kind: state
    label: "Holding"
    level: 2
    parent: proc_compute_balance
    parent_state: state_grid_tie
    description: "Battery at or near saturation; diversion paused. Awaits headroom return or surplus drop."

  state_discharging:
    kind: state
    label: "Discharging"
    level: 2
    parent: proc_compute_balance
    parent_state: state_grid_tie
    description: "Night-discharge mode. Battery feeds loads via Victron ESS grid setpoint to keep net grid import near zero."

  state_island:
    kind: state_composite
    label: "Island"
    level: 2
    parent: proc_compute_balance
    description: |
      Outage mode. Victron has transferred to microgrid via its <20 ms
      transfer switch. Energy Manager observes and adjusts setpoints
      but does NOT drive the transfer itself.

  state_battery_discharge:
    kind: state
    label: "BatteryDischarge"
    level: 2
    parent: proc_compute_balance
    parent_state: state_island
    is_initial: true       # initial sub-state of Island
    description: "Running on battery only (no sun or sun insufficient). Victron drives the microgrid."

  state_ac_coupled_solar:
    kind: state
    label: "SolarAssist"                # renamed from "ACCoupledSolar" via naming-review
    level: 2
    parent: proc_compute_balance
    parent_state: state_island
    description: |
      Sun present; Victron's frequency-shift signaling keeps Solar
      Inverters alive on the microgrid. Battery absorbs surplus and
      releases as load demands.

  state_fault:
    kind: state_composite
    label: "Fault"
    level: 2
    parent: proc_compute_balance
    description: |
      Fault mode. Contains three sub-states by category. Recovery routes
      back to GridTie or Island depending on whether grid is present.

  state_telemetry_fault:
    kind: state
    label: "TelemetryFault"
    level: 2
    parent: proc_compute_balance
    parent_state: state_fault
    is_initial: true       # initial sub-state of Fault
    description: "Telemetry channels unavailable (Modbus down, Sub-1G RF lost, MQTT broker unreachable)."

  state_actuator_fault:
    kind: state
    label: "ActuatorFault"
    level: 2
    parent: proc_compute_balance
    parent_state: state_fault
    description: "Cannot command Battery System or Solar Inverters (MQTT publish failing, OpenDTU unreachable)."

  state_policy_fault:
    kind: state
    label: "PolicyFault"
    level: 2
    parent: proc_compute_balance
    parent_state: state_fault
    description: "Policy violation (out-of-range setpoint requested, conflicting overrides, configuration error)."

# ─────────────────────────────────────────────────────────────────────
# FLOWS — labeled data and control flows crossing entities.
# Level-0 flows are between sys_root and terminators.
# Higher-level flows (between internal bubbles) appear as decomposition
# proceeds.
# ─────────────────────────────────────────────────────────────────────
flows:

  flow_f1_inverter_telemetry:
    label: "F1: per-channel telemetry"
    source: term_inverters
    target: sys_root
    refined_target: proc_acquire_telemetry   # internal endpoint at level 1
    kind: data
    medium: "Sub-1G RF → DTU-Pro-S or OpenDTU"
    level: 0
    notes: "~30 s native polling; near-realtime via OpenDTU."

  flow_f2_power_limit:
    label: "F2: power-limit setpoints"
    source: sys_root
    target: term_inverters
    refined_source: proc_dispatch_commands   # internal endpoint at level 1
    kind: control
    medium: "OpenDTU only (not via official DTU)"
    level: 0
    notes: "Conditional on DTU architectural choice. See PLAN.md > Open Questions."

  flow_f3_net_grid_power:
    label: "F3: net grid power, V/I/PF"
    source: term_meter
    target: sys_root
    refined_target: proc_acquire_telemetry
    kind: data
    medium: "RS485 Modbus RTU"
    level: 0
    notes: "Primary sensing input for the diversion loop."

  flow_f4_battery_state:
    label: "F4: SoC, mode, AC-in"
    source: term_battery_system
    target: sys_root
    refined_target: proc_acquire_telemetry
    kind: data
    medium: "MQTT / Modbus TCP"
    level: 0
    notes: "Inbound side of a bidirectional channel."

  flow_f5_battery_command:
    label: "F5: max-charge, grid setpoint"
    source: sys_root
    target: term_battery_system
    refined_source: proc_dispatch_commands
    kind: control
    medium: "MQTT publish"
    level: 0
    notes: "Primary actuating output for the diversion loop."

  flow_f6_user_input:
    label: "F6: config, override"
    source: term_user
    target: sys_root
    refined_target: proc_handle_user_input
    kind: "data+control"
    medium: "UI"
    level: 0
    notes: "Mostly config; some commands are control-flow."

  flow_f7_user_view:
    label: "F7: dashboards, alerts"
    source: sys_root
    target: term_user
    refined_source: proc_serve_ui
    kind: data
    medium: "UI"
    level: 0

  flow_f8_cloud_forward:
    label: "F8: optional telemetry forward"
    source: sys_root
    target: term_smiles_cloud
    refined_source: proc_cloud_forward
    kind: data
    medium: "HTTPS"
    level: 0
    optional: true
    notes: "Off by default; only used if owner wants Hoymiles cloud retention."

  # ─── Level 1 — internal flows (between bubbles and the store) ───
  # Style per Decision 3: event-driven (publishes on state change),
  # not polling. Names are working names pending naming review.

  flow_telemetry_to_state:
    label: "normalized state"
    source: proc_acquire_telemetry
    target: store_system_state
    kind: data
    level: 1
    notes: "Sole writer path into store_system_state."

  flow_state_to_brain:
    label: "system_state"
    source: store_system_state
    target: proc_compute_balance
    kind: data
    level: 1
    notes: "Brain reads current state to compute commands."

  flow_state_to_ui:
    label: "system_state"
    source: store_system_state
    target: proc_serve_ui
    kind: data
    level: 1

  flow_state_to_cloud:
    label: "system_state"
    source: store_system_state
    target: proc_cloud_forward
    kind: data
    level: 1
    optional: true

  flow_cmd_setpoint:
    label: "cmd_setpoint"
    source: proc_compute_balance
    target: proc_dispatch_commands
    kind: control
    level: 1
    notes: "Battery max-charge / grid-setpoint commands."

  flow_cmd_inverter_limit:
    label: "cmd_inverter_limit"
    source: proc_compute_balance
    target: proc_dispatch_commands
    kind: control
    level: 1
    notes: "Inverter throttle (only if OpenDTU + F2 active)."

  flow_event_alert:
    label: "event_alert"
    source: proc_compute_balance
    target: proc_serve_ui
    kind: control
    level: 1
    notes: "Threshold-driven alert events. Generated by brain per Decision 5."

  flow_event_override:
    label: "event_override"
    source: proc_handle_user_input
    target: proc_compute_balance
    kind: control
    level: 1
    notes: "Manual override events from owner — bypass or coerce the brain's decisions."

  flow_event_config:
    label: "event_config"
    source: proc_handle_user_input
    target: proc_acquire_telemetry
    kind: control
    level: 1
    notes: "Configuration changes (e.g., polling cadence, channel enablement)."

# ─────────────────────────────────────────────────────────────────────
# TRANSITIONS — state-machine transitions inside CSPECs
# Each transition belongs to a parent_machine (the process whose CSPEC
# contains it). Source/target reference state entities.
# ─────────────────────────────────────────────────────────────────────
transitions:

  # ─── Energy Manager CSPEC (proc_compute_balance) — locked 2026-05-22 ───

  tx_init_to_grid:
    label: "telemetry healthy"
    source_state: state_initializing
    target_state: state_grid_tie
    parent_machine: proc_compute_balance
    event: "telemetry healthy + Victron mode = grid-tie"
    action: "enable Acquire Telemetry; arm 1 Hz tick"

  tx_init_to_fault:
    label: "startup failure"
    source_state: state_initializing
    target_state: state_telemetry_fault
    parent_machine: proc_compute_balance
    event: "telemetry timeout at startup"
    action: "emit event_alert (startup-fault)"

  tx_idle_to_diverting:
    label: "surplus detected"
    source_state: state_idle
    target_state: state_diverting
    parent_machine: proc_compute_balance
    event: "net_grid_power < -threshold"
    action: "start raising battery max_charge_current"

  tx_diverting_to_idle:
    label: "balance reached"
    source_state: state_diverting
    target_state: state_idle
    parent_machine: proc_compute_balance
    event: "|net_grid_power| < deadband"
    action: "hold current setpoint"

  tx_diverting_to_holding:
    label: "SoC ≥ max"
    source_state: state_diverting
    target_state: state_holding
    parent_machine: proc_compute_balance
    event: "battery_soc >= max_soc"
    action: "clamp max_charge_current to zero"

  tx_holding_to_diverting:
    label: "surplus + headroom"
    source_state: state_holding
    target_state: state_diverting
    parent_machine: proc_compute_balance
    event: "surplus persists AND battery_soc < (max_soc - hysteresis)"
    action: "resume diversion"

  tx_idle_to_discharging:
    label: "night import"
    source_state: state_idle
    target_state: state_discharging
    parent_machine: proc_compute_balance
    event: "net-import in night-rate window"
    action: "set Victron grid_setpoint to track ≈ 0"

  tx_discharging_to_idle:
    label: "SoC ≤ min / sun returns"
    source_state: state_discharging
    target_state: state_idle
    parent_machine: proc_compute_balance
    event: "battery_soc ≤ min_soc OR sun rising"
    action: "clear grid_setpoint; resume Idle"

  tx_gridtie_to_island:
    label: "Victron → island"
    source_state: state_grid_tie
    target_state: state_island
    parent_machine: proc_compute_balance
    event: "Victron reports mode == island"
    action: "disable Cloud Forward; clamp Dispatch Commands to safe defaults"

  tx_island_to_gridtie:
    label: "Victron → grid-tie"
    source_state: state_island
    target_state: state_grid_tie
    parent_machine: proc_compute_balance
    event: "Victron reports mode == grid-tie"
    action: "re-enable Cloud Forward (if configured)"

  tx_battery_to_solar:
    label: "sun present"
    source_state: state_battery_discharge
    target_state: state_ac_coupled_solar
    parent_machine: proc_compute_balance
    event: "sun rising + Victron AC-couples inverters"
    action: "observe (no commands; Victron's frequency-shift drives)"

  tx_solar_to_battery:
    label: "sun gone / battery saturating"
    source_state: state_ac_coupled_solar
    target_state: state_battery_discharge
    parent_machine: proc_compute_balance
    event: "sun setting OR battery saturating"
    action: "state change only; Victron handles physics"

  tx_gridtie_to_fault:
    label: "fault event"
    source_state: state_grid_tie
    target_state: state_fault
    parent_machine: proc_compute_balance
    event: "fault event of any category"
    action: "emit event_alert (fault); clamp to safe defaults"

  tx_island_to_fault:
    label: "fault event"
    source_state: state_island
    target_state: state_fault
    parent_machine: proc_compute_balance
    event: "fault event of any category"
    action: "emit event_alert (fault); clamp to safe defaults"

  tx_fault_to_gridtie:
    label: "cleared + grid present"
    source_state: state_fault
    target_state: state_grid_tie
    parent_machine: proc_compute_balance
    event: "fault cleared + Victron mode = grid-tie"
    action: "resume normal operation in GridTie"

  tx_fault_to_island:
    label: "cleared + grid absent"
    source_state: state_fault
    target_state: state_island
    parent_machine: proc_compute_balance
    event: "fault cleared + Victron mode = island"
    action: "resume normal operation in Island"

# ─────────────────────────────────────────────────────────────────────
# EDGES — non-data physical or implicit connections shown in diagrams
# for context but not modeled as flows.
# ─────────────────────────────────────────────────────────────────────
edges:

  edge_grid_to_inverters:
    label: "AC power"
    source: term_grid
    target: term_inverters
    kind: physical_ac_power
    level: 0
    notes: "Physical AC power line. Not modeled as a flow; shown for context."

  edge_grid_to_battery:
    label: "AC power"
    source: term_grid
    target: term_battery_system
    kind: physical_ac_power
    level: 0
    notes: |
      Physical AC power line via Victron AC-IN. AC-coupled microgrid
      during outages (Battery System generates micro-grid; Solar Inverters
      stay alive via frequency-shift throttling).


# ─── Stage 4 — PSPECs (leaf-process functional contracts) ───
# Format: 2000 Fig 4.46 (INPUTS / OUTPUTS / TRANSFORMATION).
# Source: see toolkit/PSPEC_DESIGN.md.

pspecs:

  pspec_acquire_telemetry:
    parent_process: proc_acquire_telemetry
    transformation:
      style: textual
      body: |
        Each ingest cycle:
          Read F1 PER CHANNEL TELEMETRY from the inverter side via the
          configured DTU adapter (DTU-Pro-S, OpenDTU, or AhoyDTU).
          Read F3 NET GRID POWER V I PF from the grid-tied power meter
          via Modbus RTU.
          Read F4 SOC MODE AC IN from the battery system via MQTT or
          Modbus TCP.
        On receipt of EVENT CONFIG:
          Apply the new configuration values (sample rates, source
          selection, scaling).
        Normalize all readings into the canonical NORMALIZED STATE shape
        and write it to store_system_state.
    computational_constraints:
      frequency: "≥ 1 Hz aggregate ingest rate; ≥ 0.5 Hz per source"
      timing: "End-to-end ingest → store_system_state write latency < 1 s"
    comments: |
      Sole writer into the telemetry portion of the store. Vendor adapter
      details and reconnection policy live in the architecture model,
      not here (PSPECs specify what, not how — 1988 §13.1).
    # ─── Modernization #25 — V&V ───
    verification:
      methods: [test, analysis]
      coverage_target: 90.0
      validation_scenarios:
        - "Sustained 1 Hz aggregate ingest across all three sources for 24 hours"
        - "DTU reconnect within 30 s of a transient network drop"
        - "Modbus RTU CRC failure causes only that sample to be discarded, not session drop"
    # ─── Modernization #1 — runtime observability ───
    observability:
      metrics:
        - { name: "telemetry_samples_total", kind: counter, description: "Total telemetry samples ingested (all sources)" }
        - { name: "telemetry_ingest_seconds", kind: histogram, unit: s, description: "End-to-end ingest cycle duration" }
        - { name: "telemetry_source_lag_seconds", kind: gauge, unit: s, description: "Per-source age of latest sample" }
      traces:
        - { span: "telemetry.ingest_cycle", description: "One full multi-protocol ingest cycle" }
      logs:
        - { category: "telemetry.adapter", level: info }
      alerts:
        - name: telemetry_source_stale
          when: "max(telemetry_source_lag_seconds) > 30"
          severity: warning
          runbook: runbooks/telemetry-source-stale.md
          escalation_after_min: 15

  pspec_dispatch_commands:
    parent_process: proc_dispatch_commands
    transformation:
      style: textual
      body: |
        On receipt of CMD SETPOINT:
          Translate the desired inverter power-limit setpoint into the
          vendor-specific frame and issue F2 POWER LIMIT SETPOINTS to
          the inverter side via the configured DTU adapter.
        On receipt of CMD INVERTER LIMIT:
          Translate the desired battery charge / grid-setpoint command
          and issue F5 MAX CHARGE GRID SETPOINT to the battery system
          via MQTT publish.
    computational_constraints:
      timing: "Command → actuator latency < 500 ms"
      accuracy: "Translated values honor command to within vendor protocol resolution"
    comments: |
      Adapter logic. The "issue" keyword in the body marks F2 and F5 as
      time-transient (1988 §13.3) — each command propagates once, not
      held by this bubble.

  pspec_serve_ui:
    parent_process: proc_serve_ui
    transformation:
      style: textual
      body: |
        Render F7 DASHBOARDS ALERTS combining:
          the current SYSTEM STATE (power flows, SoC, mode, recent
          history),
          and any EVENT ALERT received from the Energy Manager.
        Provide drill-in views for inverter-side, grid-side, and
        battery-side detail.
    computational_constraints:
      frequency: "Dashboard refresh ≥ 1 Hz; alert latency < 500 ms"
    comments: |
      Read-only presentation. No commands originate here; user actions
      go through proc_handle_user_input.

  pspec_handle_user_input:
    parent_process: proc_handle_user_input
    transformation:
      style: textual
      body: |
        On receipt of F6 CONFIG OVERRIDE from the angler / owner:
          Classify the input:
            - structural changes (setpoints, source enable/disable,
              policy thresholds) → issue EVENT CONFIG;
            - immediate operational overrides (manual mode, enable/
              disable, force-recompute) → issue EVENT OVERRIDE.
          Apply input validation; reject malformed inputs.
    computational_constraints:
      timing: "Input → emitted event latency < 200 ms"
    comments: |
      Owner-facing input gateway. Both EVENT CONFIG and EVENT OVERRIDE
      are transient (1988 §13.3) — the "issue" keyword reflects that.

  pspec_cloud_forward:
    parent_process: proc_cloud_forward
    transformation:
      style: textual
      body: |
        If cloud forwarding is enabled by configuration:
          Subscribe to changes in SYSTEM STATE and issue
          F8 OPTIONAL TELEMETRY FORWARD to S-Miles Cloud at the
          configured cadence.
        Otherwise, do nothing.
    computational_constraints:
      frequency: "Configurable; default 1/min when enabled"
      timing: "Best-effort; not in the diversion-control critical path"
    comments: |
      Optional bubble (per Stage 1 Decision 5). The "issue" keyword marks
      F8 as time-transient — each posting is a single event, not a held
      output (1988 §13.3).


# ─── Stage 5 — Architecture Model ───
# Format: 2000 §4.2 (AFD + AID + AMS + AIS + allocation).
# Source: see toolkit/ARCH_DESIGN.md.

architecture_modules:

  am_controller_host:
    name: "Controller Host"
    module_number: "AM 1"
    kind: hardware
    description: |
      Raspberry Pi 4 (or x86 mini-PC) running the on-prem controller.
      Hosts all back-end processes: multi-protocol ingest, the energy-
      manager state machine, output adapters to inverters + battery,
      and the optional cloud-forward bridge.
    allocated_processes:
      - proc_acquire_telemetry
      - proc_dispatch_commands
      - proc_cloud_forward
    allocated_cspecs:
      - proc_compute_balance
    allocated_stores:
      - store_system_state
    trust_zone: privileged             # modernization #8.1 — owns inverter/battery commands

  am_dashboard_app:
    name: "Dashboard Web App"
    module_number: "AM 2"
    kind: software
    description: |
      Browser-side single-page app for the owner. Renders dashboards
      built from system_state; surfaces alerts; accepts config + manual
      overrides. Communicates with the controller host over local
      WebSocket / HTTP.
    allocated_processes:
      - proc_serve_ui
      - proc_handle_user_input
    trust_zone: internal_lan           # modernization #8.1 — owner's browser on LAN

architecture_flows:

  af_state_to_dashboard:
    name: "state + alerts"
    source: am_controller_host
    target: am_dashboard_app
    kind: data
    physical_description: |
      WebSocket push of state snapshots + event_alert messages.
      JSON-encoded; ~1 Hz aggregate plus event-driven alerts.
    allocated_flows:
      - flow_state_to_ui
      - flow_event_alert
    synchronicity: streaming           # modernization #2 — continuous WebSocket stream
    delivery: at_least_once

  af_input_to_controller:
    name: "config + override"
    source: am_dashboard_app
    target: am_controller_host
    kind: data
    physical_description: |
      HTTP POST + WebSocket commands from the dashboard to the
      controller. Carries config changes and manual overrides.
    allocated_flows:
      - flow_event_config
      - flow_event_override
    synchronicity: sync_request_response   # modernization #2 — HTTP POST + ack
    delivery: at_least_once

architecture_interconnects:

  ai_local_lan:
    name: "Local LAN"
    endpoints: [am_controller_host, am_dashboard_app]
    carries: [af_state_to_dashboard, af_input_to_controller]
    description: |
      Wired or wireless LAN connecting the owner's browser to the
      controller host. WebSocket + HTTP over TCP/IP. No public
      Internet exposure required.
    auth_required: shared_secret       # modernization #8.1 — local LAN, single owner
    encryption: tls                    # HTTPS + WSS on LAN
    # ─── Modernization #8.2 — STRIDE threat model ───
    stride_mitigations:
      spoofing: |
        Shared-secret authentication (rotating per-owner bearer token,
        served by the controller's first-login bootstrap) prevents
        unauthorized browsers from connecting. The LAN itself is the
        outer ring of defense — assumes the owner has reasonable Wi-Fi
        hygiene.
      tampering: |
        TLS (HTTPS + WSS) protects in-flight messages against tampering.
        Controller signs config-change responses with the session token
        so the browser can detect mid-session injection.
      repudiation: |
        out_of_scope — single owner; no audit requirement at this tier.
        ADR-002 explicitly defers any audit trail to a future cloud
        forwarding option.
      info_disclosure: |
        TLS encryption protects state + telemetry in transit. Dashboard
        does not store usage data persistently in the browser beyond
        the session token.
      denial_of_service: |
        Rate-limit config-POST endpoints (10 req/min per session).
        WebSocket connection cap of 4 per session. Controller's
        diversion-control loop is decoupled from dashboard liveness —
        loss of LAN does not affect energy management.
      elev_of_privilege: |
        Dashboard session token grants only configured-scope permissions
        (config + view; no firmware update, no factory reset). Reset
        and firmware update require a separate physical-button flow
        on the controller host.

architecture_module_specs:

  ams_controller_host:
    parent_module: am_controller_host
    description: |
      Single-board computer running Linux + the HP-derived controller
      service. Carries all the device-facing protocols (Sub-1G RF to
      the DTU, Modbus RTU to the meter, MQTT/Modbus TCP to the
      battery system), the diversion-control state machine, and the
      output adapters that translate cmd_setpoint / cmd_inverter_limit
      back into vendor protocols.
    design_rationale: |
      Single-host architecture chosen over a distributed setup because
      the dataset is small enough (sub-kHz aggregate) to fit on one
      modest controller, and a single failure domain simplifies the
      diversion-control safety story.
    design_justification: |
      Pi 4 with 2 GB RAM is overprovisioned for the workload: ~50 KB/s
      aggregate ingest, ~100 KB heap working set. Vendor adapters are
      Python or Go processes well within budget.
    required_constraints:
      reliability: "MTBF > 8000 hours indoor mounted."
      safety: "Diversion command path must fail-safe to 'zero export'
        on host failure (Victron's fallback handles outage transfer
        independently)."
      physical: "Indoor mount; passive cooling; mains UPS."
      cost: "BoM ≤ $200 including UPS and enclosure."
    interfaces: |
      Inputs:  F1 PER CHANNEL TELEMETRY (Sub-1G RF via DTU-Pro-S or
               OpenDTU); F3 NET GRID POWER (RS485 Modbus RTU);
               F4 SOC MODE AC IN (MQTT or Modbus TCP).
      Outputs: F2 POWER LIMIT SETPOINTS (OpenDTU only);
               F5 MAX CHARGE GRID SETPOINT (MQTT publish);
               F8 OPTIONAL TELEMETRY FORWARD (HTTPS, off by default).
      LAN:     WebSocket + HTTP to the Dashboard Web App.

  ams_dashboard_app:
    parent_module: am_dashboard_app
    description: |
      SPA served from the controller host. Renders live dashboards
      (power flows, SoC, mode, recent history); surfaces alerts in a
      banner; exposes config controls and manual override buttons.
      Runs entirely in the owner's browser; talks back via WebSocket
      and HTTP.
    design_rationale: |
      Browser-based UI chosen over a native app to avoid app-store
      friction and to make the controller usable from any device on
      the owner's LAN without install.
    required_constraints:
      reliability: "Reconnects to controller within 5 s of WebSocket
        drop; surfaces 'disconnected' state to the owner."
      physical: "Runs in any modern browser (Chrome, Safari, Firefox)."

architecture_interconnect_specs:

  ais_local_lan:
    parent_interconnect: ai_local_lan
    description: |
      The owner's local network connecting the dashboard browser to
      the controller host. WebSocket carries push notifications
      (state updates, alerts); HTTP serves the SPA and accepts config
      POSTs.
    protocol_standard: |
      HTTP/1.1 (RFC 7230) for static asset serving and config POSTs;
      WebSocket (RFC 6455) for push notifications. JSON message
      format documented in the controller's protocol spec.
    design_rationale: |
      LAN-only by default — no public Internet exposure. Owner can
      reverse-proxy externally if remote access is wanted, but that
      is out-of-scope here.
    required_constraints:
      reliability: "Survives router reboots without manual reconnect
        on the dashboard side."
      timing: "State-update latency < 1 s end-to-end."


# ─── Modernization #10 — Architecture Decision Records ───

adrs:

  adr_001_outage_inside_cspec:
    title: "Outage handling lives inside the Energy Manager CSPEC"
    status: accepted
    date: 2026-05-22
    author: "solar dogfood"
    context: |
      The system needs to handle grid outages (utility goes down → battery
      takes over → utility returns) without dropping into a fault state. Two
      approaches were on the table during Stage 2: (a) make outage handling
      a separate process bubble that gates the diversion loop; (b) make
      outage handling a mode of the Energy Manager's CSPEC alongside
      GridTie and Fault.
    decision: |
      Outage handling is an `Island` mode of the Energy Manager CSPEC,
      peer to GridTie and Fault. The diversion-loop sub-states live
      under GridTie; the Island mode has its own setpoint-passthrough
      behavior; transitions are driven by Victron's reported mode.
    consequences: |
      - The CSPEC is the single source of truth for "what mode is the
        system in" — no separate outage-state bubble to keep in sync.
      - Victron is trusted as the authoritative mode source; we don't
        debounce its mode reports (the AC transfer is < 20 ms, fast
        enough that our 1 Hz tick has nothing meaningful to add).
      - Future "manual override" behavior is a modifier *within* a
        mode (Decision 5), not a separate Manual mode.
    alternatives:
      - "Separate outage-handler process bubble — rejected: forces every level-1 reader to gate on two states."
      - "Manual mode as a peer to GridTie/Island/Fault — rejected: doubles state count and pairs poorly with diversion sub-states."
    affects:
      modules: [am_controller_host]
      processes: [proc_compute_balance]
      states: [state_grid_tie, state_island, state_fault]

  adr_002_local_only_dashboard:
    title: "Dashboard is local-LAN only by default"
    status: accepted
    date: 2026-05-22
    author: "solar dogfood"
    context: |
      The owner needs a dashboard to view solar production, battery state,
      and recent events; and to push config + manual overrides. Public
      remote access is a tempting feature but adds significant attack
      surface (any control-plane mistake becomes internet-exposed) and
      compliance considerations (CCPA disclosure for usage telemetry).
    decision: |
      Dashboard runs as a browser-side SPA served by the controller host
      over the owner's local LAN. No public-internet exposure by default.
      Owner-led reverse-proxy setup is documented for remote access as
      an opt-in, but it is out of scope for the supported configuration.
    consequences: |
      - Reduced attack surface: dashboard authentication can use a shared
        secret on LAN rather than full OAuth/OIDC.
      - Owners who want remote access must run their own reverse proxy
        and assume responsibility for its security posture.
      - Cloud Forward (the optional S-Miles bridge) is unaffected — it's
        a separate optional outbound path with its own threat model.
    alternatives:
      - "Public cloud-hosted dashboard with per-user OAuth — rejected for now (compliance + scope)."
      - "VPN-only access — rejected: too high friction for typical owners."
    affects:
      modules: [am_dashboard_app, am_controller_host]
      interconnects: [ai_local_lan]
    # ─── Modernization #8.3 — catalog references ───
    references_mitre_attack:
      - T1190       # Exploit Public-Facing Application — eliminated by local-LAN-only scope
      - T1078       # Valid Accounts — addressed via shared-secret bootstrap
    references_cwe:
      - CWE-306     # Missing Authentication for Critical Function — addressed by always-on auth
      - CWE-319     # Cleartext Transmission — addressed by TLS
    references_compliance:
      - "CCPA-1798.100"   # California consumer privacy — out-of-scope rationale captured in ADR context


# ─── Modernization #21 / #22 — Budgets + TPMs ───

budgets:

  budget_diversion_loop_latency:
    name: "Grid sense → inverter setpoint latency"
    unit: ms
    system_target: 1000                # 1 second end-to-end
    system_reserve: 200
    allocations:
      am_controller_host: 800          # ingest + compute + dispatch
      # am_dashboard_app: 0 — not in the diversion-control critical path
    notes: |
      The diversion loop must respond fast enough to prevent meaningful
      grid export under sudden surplus (clouds clearing, sunlight burst).
      1 s end-to-end with 200 ms reserve is comfortable for a residential
      grid-tie inverter (the inverter's own response time dominates the
      remaining 800 ms of allowed action).

  budget_monthly_cloud_cost:
    name: "Monthly cloud cost"
    unit: USD
    system_target: 5.00
    system_reserve: 1.00
    allocations:
      am_controller_host: 3.00         # optional cloud-forward egress + WAN bandwidth
      am_dashboard_app: 1.00           # CDN / SPA hosting (if any)
    notes: |
      Budget assumes default Cloud Forward = off. When enabled, only
      session events forward; not raw telemetry. Keeps the deployment
      affordable for a single residential owner.

tpms:

  tpm_diversion_response_p99:
    name: "Diversion loop p99 response latency (measured)"
    unit: ms
    threshold: 1000                    # = budget_diversion_loop_latency.system_target
    target: 700
    current_estimate: 750
    growth_allowance: 250              # 1000 - 750
    measurement_method: "histogram_quantile(0.99, diversion_loop_duration_seconds_bucket)"
    derived_from_budget: budget_diversion_loop_latency
    trend_notes: |
      Currently 750 ms p99 at 200-sample window. Slowest path: Sub-1G
      DTU re-read (250 ms tail). Improving with OpenDTU's batched
      reads (vs DTU-Pro-S sequential reads).

  tpm_actual_monthly_cost:
    name: "Actual monthly cloud cost (last 30d)"
    unit: USD
    threshold: 5.00
    target: 4.00
    current_estimate: 2.30             # Cloud Forward currently off; only bandwidth + CDN
    growth_allowance: 2.70
    measurement_method: "Sum of AWS cost-explorer line items tagged solar-stack"
    derived_from_budget: budget_monthly_cloud_cost
    trend_notes: |
      $2.30/month with Cloud Forward disabled. Estimated to rise to ~$3.80
      if owner enables Cloud Forward — still within budget.

  tpm_dashboard_render_p99:
    name: "Dashboard render p99 latency (browser side)"
    unit: ms
    threshold: 2000
    target: 1000
    current_estimate: 1200
    growth_allowance: 800
    measurement_method: "browser-side performance.now() span on dashboard mount"
    trend_notes: |
      No associated budget (informational TPM). p99 dominated by
      initial WebSocket connect; warm renders are ~150 ms.


# ─── Modernization #32 — SLOs ───

service_level_objectives:

  slo_diversion_loop_latency:
    name: "Diversion-loop response latency"
    sli:
      query: 'histogram_quantile(0.99, rate(diversion_loop_seconds_bucket[5m]))'
      unit: seconds
      description: "p99 latency from grid-sense reading to inverter setpoint command."
    target: 1.0                          # = budget_diversion_loop_latency.system_target (1000ms)
    window: 30d
    error_budget_pct: 0.5                # 0.5% of cycles may exceed 1s over 30d
    applies_to:
      modules: [am_controller_host]
    sla: "Diversion-loop p99 response under 1 second over any 30-day window."
    derives_from_tpm: tpm_diversion_response_p99
    runbook_on_burn: runbooks/slo-diversion-burn.md

  slo_monthly_cost:
    name: "Monthly cloud cost SLO"
    sli:
      query: 'sum(cloud_cost_usd_monthly_total)'
      unit: USD
      description: "Sum of all cloud-cost-explorer line items tagged solar-stack."
    target: 5.0                          # = budget_monthly_cloud_cost.system_target
    window: 30d
    error_budget_pct: 20.0               # 20% margin — generous for cost SLOs
    applies_to:
      modules: [am_controller_host, am_dashboard_app]
    derives_from_tpm: tpm_actual_monthly_cost
